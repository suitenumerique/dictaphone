<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/public/assets/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/assets/logo-picto.svg" />
    <link rel="shortcut icon" href="/public/assets/favicon.ico" />
    <!-- Font URLs are resolved and replaced by Vite during the build process. Font loading failures will not break the application. -->

      rel="preload"
      as="font"
      crossorigin="anonymous"
      href="/node_modules/@fontsource/material-icons/files/material-icons-latin-400-normal.woff2"
      type="font/woff2"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
