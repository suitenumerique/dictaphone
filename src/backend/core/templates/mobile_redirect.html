<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <script>
    (function() {
      const sessionKey = "{{ session_key }}";
      const deepLink = "{{ deep_link }}";
      const csrfToken = "{{ csrf_token }}";

      if (sessionKey) {
        const url = `${deepLink}?$sessionId=${sessionKey}&csrfToken=${csrfToken}`;
        window.location.href = url;
      } else {
        document.body.innerText = "Missing session.";
      }
    })();
  </script>
</head>
<body>
  Redirecting to app...
</body>
</html>
